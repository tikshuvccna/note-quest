<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1b1d3a" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>מסע התווים — Note Quest</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #1b1d3a;
        --accent: #ffd23f;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        font-family: 'Rubik', system-ui, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Phaser injects its canvas here; Scale.FIT centers it. */
      canvas { display: block; }

      /* Simple loading splash shown until Phaser boots */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        gap: 16px;
        z-index: 10;
      }
      #splash .title { font-size: 8vmin; font-weight: 900; }
      #splash .sub { font-size: 3.5vmin; color: #fff; opacity: 0.8; }
      #splash.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="splash">
      <div class="title">🎵 מסע התווים</div>
      <div class="sub">טוען…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
